name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ci:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: |
            package-lock.json
            prototype/package-lock.json
            dashboard/package-lock.json

      # ── Root lint & format ──
      - name: Install root dependencies
        run: npm ci

      - name: Lint
        run: npx oxlint .

      - name: Check formatting
        run: npx prettier --check .

      # ── Prototype ──
      - name: Install prototype dependencies
        working-directory: prototype
        run: npm ci

      - name: Check prototype module loads
        working-directory: prototype
        run: node -e "require('./api/index')"
        env:
          DATABASE_URL: postgresql://placeholder:placeholder@localhost:5432/test
          JWT_SECRET: ci-test-secret

      # ── Dashboard ──
      - name: Install dashboard dependencies
        working-directory: dashboard
        run: npm ci

      - name: Build dashboard
        working-directory: dashboard
        run: npm run build
